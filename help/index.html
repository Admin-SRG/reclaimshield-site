<title>Coming Soon | ReclaimShield&trade;</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#F3F4F6;color:#0A0A0F;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:48px 40px;max-width:520px;text-align:center;box-shadow:0 4px 24px rgba(10,10,15,0.06)}

h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;color:#0A0A0F;margin-bottom:16px;font-weight:700;line-height:1.2}
p{color:#4B5563;line-height:1.65;margin-bottom:14px;font-size:1rem}
.divider{width:48px;height:2px;background:linear-gradient(135deg,#7C3AED 0%,#2DD4BF 100%);margin:24px auto;border:none}
.foot{font-size:0.78rem;color:#9CA3AF;margin-top:32px;letter-spacing:0.3px}

<div class="card">
