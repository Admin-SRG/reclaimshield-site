<?xml version="1.0" encoding="UTF-8"?>
<!--
  ReclaimShield R-Shield - AMAZON variant (v1, Option A)
  Locked 2026-04-24 by C.
  Spec: orange→blue gradient, dark ink fill, Space Grotesk Bold R.
  Used on: reclaimshield.io/amazon, /amazon/thanks, and ReclaimShield-for-Amazon email surfaces.
  Palette: border #FF9900 -> #146EB4; crown #FFB84D@0.55 -> #FF9900@0; fill #0A0A0F; R #FFFFFF.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 0 140 180">
  <defs>
    <linearGradient id="rsBorderAmz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#146EB4"/>
    </linearGradient>
    <linearGradient id="rsBevelHiAmz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB84D" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#FF9900" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rsClipAmz">
      <path d="M 40 18 Q 40 8 50 8 L 160 8 Q 170 8 170 18 L 170 80 Q 170 140 105 170 Q 40 140 40 80 Z"/>
    </clipPath>
  </defs>

  <path d="M 40 18 Q 40 8 50 8 L 160 8 Q 170 8 170 18 L 170 80 Q 170 140 105 170 Q 40 140 40 80 Z"
        fill="#0A0A0F" stroke="url(#rsBorderAmz)" stroke-width="4"/>

  <g clip-path="url(#rsClipAmz)">
    <rect x="40" y="10" width="130" height="26" fill="url(#rsBevelHiAmz)"/>
  </g>

  <text x="105" y="108" text-anchor="middle"
        font-family="'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-3">R</text>
</svg>
