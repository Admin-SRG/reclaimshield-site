<?xml version="1.0" encoding="UTF-8"?>
<!--
  ReclaimShield canonical logo — FINAL v2 BEVEL (medium-spec lock)
  Confirmed by C on 2026-04-24. Use verbatim in all RS surfaces.

  Spec:
  - Shield path: M 40 18 Q 40 8 50 8 L 160 8 Q 170 8 170 18 L 170 80 Q 170 140 105 170 Q 40 140 40 80 Z
  - Fill: #0A0A0F (RS ink)
  - Outer stroke: 4px, linear-gradient top-down #9F6BF2 → #2DD4BF
  - Crown highlight sliver: 40,10 / 130 wide / 26 tall, clipped to shield, linear-gradient #A889F5@0.55 → #7C3AED@0
  - Letter R: Space Grotesk Bold 96px, x=105, y=108, text-anchor middle, letter-spacing -3, fill #FFFFFF
  - viewBox 35 0 140 180 crops tight with small margins
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 0 140 180">
  <defs>
    <linearGradient id="rsBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9F6BF2"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="rsBevelHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A889F5" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rsClip">
      <path d="M 40 18 Q 40 8 50 8 L 160 8 Q 170 8 170 18 L 170 80 Q 170 140 105 170 Q 40 140 40 80 Z"/>
    </clipPath>
  </defs>

  <path d="M 40 18 Q 40 8 50 8 L 160 8 Q 170 8 170 18 L 170 80 Q 170 140 105 170 Q 40 140 40 80 Z"
        fill="#0A0A0F" stroke="url(#rsBorder)" stroke-width="4"/>

  <g clip-path="url(#rsClip)">
    <rect x="40" y="10" width="130" height="26" fill="url(#rsBevelHi)"/>
  </g>

  <text x="105" y="108" text-anchor="middle"
        font-family="'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-3">R</text>
</svg>
